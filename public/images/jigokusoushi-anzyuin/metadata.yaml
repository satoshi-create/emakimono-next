# ==========================================
# master_texts へのアップロード用データ
# ==========================================
master_texts:
  - common_id: "jigoku-anzyuin-1"
    title: "髪火流"
    title_en: "The Hell of Burning Hair (Hatsukaru)"
    description: "ここは、生前、殺生、偸盗・邪淫・妄語をおこない、また五戒を守っている人に、言葉巧みに酒の功徳を説いて、酒を飲ませた者が落ちる。熱鉄の犬や鉄の嘴を持った鷲がいて、足を咬み、頭蓋骨に穴を開けて、脳髄を飲むという。"
    description_en: "This hell is for those who committed killing, stealing, sexual misconduct, and lying, or deceived others into drinking alcohol. Here, iron dogs and eagles with iron beaks bite the sinners, pierce their skulls, and drink their brains."

  - common_id: "jigoku-anzyuin-2"
    title: "火末虫"
    title_en: "The Hell of Fire-Tipped Insects (Kamatsumushi)"
    description: "ここは、生前、殺生、偸盗・邪淫をおこない、また酒の中に水増しをして売り、巨利を得た者が落ちる。みずからの身体から数多（あまた）の虫がわき、肉体や骨の髄までも食いさいなまれる。その苦しみは耐えがたく、叫ぶ声が耐えない。"
    description_en: "Sinners who diluted alcohol with water for profit fall here. Innumerable insects emerge from their bodies, devouring their flesh and the marrow of their bones. The pain is unbearable, and their screams never cease."

  - common_id: "jigoku-anzyuin-3"
    title: "雲火霧"
    title_en: "The Hell of Cloud, Fire, and Mist (Unkamu)"
    description: "ここは、生前、殺生、偸盗・邪淫をおこない、また五戒を守っている人に酒を飲ませて酔わせ、それを見て喜ぶ者が落ちる。この地獄には業火が燃え盛り、罪人は足の先から頭の先まで、焼け切って消え失せ、また蘇る。このようなことがやむことはない。"
    description_en: "For those who forced others to drink and laughed at their intoxication. Enveloped in roaring flames, sinners are burnt to ash from toe to head, only to be revived and burnt again in an endless cycle of agony."

  - common_id: "jigoku-anzyuin-4"
    title: "雨炎火石"
    title_en: "The Hell of Raining Flaming Stones (Uenkaseki)"
    description: "ここは、生前、殺生、偸盗・邪淫をおこない、また酒を用意して、旅行する人に飲ませて酔わせ、財物を奪い、殺した者が落ちる。炎のある焼け石が天から降り注ぎ、銅の湯、白鑞（びゃくろう）の湯と熱い血が流れる河で苦しみを受ける。"
    description_en: "This hell is for those who intoxicated travelers to rob and kill them. Flaming stones rain from the sky, while a river filled with molten copper, tin, and hot blood forces sinners to swim in eternal pain."
