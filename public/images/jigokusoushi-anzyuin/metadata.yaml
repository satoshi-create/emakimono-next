desc: "平安時代末期に制作された地獄草紙。安住院に伝来したもので、火末虫地獄や雲火霧地獄など、凄惨ながらもどこかユーモラスな鬼の描写が特徴です。"
desc_en: "A late Heian period Hell Scroll formerly owned by Anzyuin. It vividly depicts various Buddhist hells with a touch of caricature in its demonic figures."
thumb: "/jigokusoushi_anzyuin_thumb.webp"
favorite: true

