name: Sync scroll to Cloudinary and Supabase

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to scroll_config.yaml (relative to repo root)'
        required: false
        default: 'scroll_config.yaml'
      skip_upload:
        description: 'Skip Cloudinary upload (only upsert DB)'
        required: false
        default: false
        type: boolean
  push:
    branches: [preview, main]
    paths:
      - 'scroll_config.yaml'
      - 'scroll_config*.yaml'
      - 'public/images/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements-sync.txt

      # --- ここからデバッグ処理 ---
      - name: Debug Environment and Files
        run: |
          echo "=== 📂 Current Directory Listing ==="
          ls -R public/images/

          echo "=== 📄 Config File Content ==="
          CONFIG_PATH="${{ github.event.inputs.config_path || 'scroll_config.yaml' }}"
          if [ -f "$CONFIG_PATH" ]; then
            cat "$CONFIG_PATH"
          else
            echo "Error: Config file not found at $CONFIG_PATH"
          fi

          echo "=== 🌐 Environment Variables ==="
          echo "SCROLL_IMAGES_DIR: public/images"
          echo "CONFIG_PATH: $CONFIG_PATH"
      # --- ここまでデバッグ処理 ---

      - name: Sync scroll
        env:
          SCROLL_IMAGES_DIR: "public/images"
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          CONFIG="${{ github.event.inputs.config_path || 'scroll_config.yaml' }}"
          SKIP="${{ github.event.inputs.skip_upload }}"
          if [ -n "$SKIP" ] && [ "$SKIP" = "true" ]; then
            python scripts/sync_scroll.py "$CONFIG" --skip-upload
          else
            python scripts/sync_scroll.py "$CONFIG"
          fi
